context:
  version: "3.1.13"

package:
  name: nodemon
  version: ${{ version }}

source:
  url: https://registry.npmjs.org/nodemon/-/nodemon-${{ version }}.tgz
  sha256: 441f2b72cfb7babe9ae55a7b764d58a3a741d1d6bfeef8f916823e8096095d34

build:
  number: 0
  noarch: generic

requirements:
  build:
    - nodejs
    - pnpm
    - pnpm-licenses
  run:
    - nodejs

tests:
  - script:
      - nodemon --help

about:
  license: MIT
  license_file:
    - LICENSE
    - third-party-licenses.txt
  summary: Monitor for any changes in your node.js application and automatically restart the server - perfect for development
  homepage: https://github.com/remy/nodemon
  repository: https://github.com/remy/nodemon

extra:
  recipe-maintainers:
    - danielnachun
